<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kafka 배치 기반 실시간 채팅 아키텍처</title>
  <desc id="desc">브라우저의 STOMP 메시지가 Spring Boot와 Kafka를 거쳐 MySQL에 배치 저장된 후 WebSocket으로 전달되며 Redis는 세션과 접속 상태만 관리하는 구조</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef6f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 800 42px 'Pretendard','Noto Sans KR',Arial,sans-serif; fill: #17202a; }
      .subtitle { font: 500 20px 'Pretendard','Noto Sans KR',Arial,sans-serif; fill: #64748b; }
      .node-title { font: 800 25px 'Pretendard','Noto Sans KR',Arial,sans-serif; fill: #17202a; }
      .node-copy { font: 500 17px 'Pretendard','Noto Sans KR',Arial,sans-serif; fill: #52606d; }
      .step { font: 800 16px 'Pretendard','Noto Sans KR',Arial,sans-serif; fill: #fff; }
      .label { font: 700 16px 'Pretendard','Noto Sans KR',Arial,sans-serif; fill: #0f766e; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .primary { fill: #ecfdf5; stroke: #0f766e; stroke-width: 3; rx: 18; filter: url(#shadow); }
      .data { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 18; filter: url(#shadow); }
      .arrow { fill: none; stroke: #0f766e; stroke-width: 4; marker-end: url(#arrow); }
      .return { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrowBlue); }
      .dashed { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="72" text-anchor="middle" class="title">Kafka 배치 기반 실시간 채팅 아키텍처</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">방별 순서 유지 · 중복 저장 방지 · MySQL 저장 후 실시간 전달</text>

  <rect x="70" y="225" width="240" height="170" class="card"/>
  <circle cx="190" cy="275" r="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <path d="M145 350 Q190 305 235 350" fill="none" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
  <text x="190" y="375" text-anchor="middle" class="node-title">Browser</text>
  <text x="190" y="423" text-anchor="middle" class="node-copy">STOMP / SockJS</text>

  <rect x="400" y="185" width="300" height="250" class="primary"/>
  <text x="550" y="235" text-anchor="middle" class="node-title">Spring Boot</text>
  <text x="550" y="276" text-anchor="middle" class="node-copy">ChatSendFacade</text>
  <text x="550" y="310" text-anchor="middle" class="node-copy">방·회원 검증 / ID·시간 부여</text>
  <text x="550" y="344" text-anchor="middle" class="node-copy">미접속 사용자 알림 생성</text>
  <rect x="465" y="370" width="170" height="38" rx="19" fill="#0f766e"/>
  <text x="550" y="396" text-anchor="middle" class="step">Kafka Producer</text>

  <rect x="810" y="185" width="300" height="250" class="primary"/>
  <text x="960" y="235" text-anchor="middle" class="node-title">Kafka topic</text>
  <text x="960" y="276" text-anchor="middle" class="node-copy">key = roomId</text>
  <text x="960" y="310" text-anchor="middle" class="node-copy">같은 방 → 같은 partition</text>
  <text x="960" y="344" text-anchor="middle" class="node-copy">acks=all / idempotence</text>
  <rect x="875" y="370" width="170" height="38" rx="19" fill="#0f766e"/>
  <text x="960" y="396" text-anchor="middle" class="step">영속화 버퍼</text>

  <rect x="1210" y="165" width="320" height="290" class="primary"/>
  <text x="1370" y="215" text-anchor="middle" class="node-title">Batch Consumer</text>
  <text x="1370" y="256" text-anchor="middle" class="node-copy">최대 100건 poll</text>
  <text x="1370" y="290" text-anchor="middle" class="node-copy">방·회원 일괄 조회</text>
  <text x="1370" y="324" text-anchor="middle" class="node-copy">메시지 ID 중복 제거</text>
  <text x="1370" y="358" text-anchor="middle" class="node-copy">@Transactional</text>
  <rect x="1270" y="390" width="200" height="38" rx="19" fill="#0f766e"/>
  <text x="1370" y="416" text-anchor="middle" class="step">ChatMessageBatchService</text>

  <path d="M310 310 H400" class="arrow"/>
  <text x="355" y="292" text-anchor="middle" class="label">1. SEND</text>
  <path d="M700 310 H810" class="arrow"/>
  <text x="755" y="292" text-anchor="middle" class="label">2. publish</text>
  <path d="M1110 310 H1210" class="arrow"/>
  <text x="1160" y="292" text-anchor="middle" class="label">3. batch poll</text>

  <rect x="1040" y="590" width="360" height="180" class="data"/>
  <ellipse cx="1110" cy="644" rx="34" ry="15" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="3"/>
  <path d="M1076 644 V700 C1076 720 1144 720 1144 700 V644" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <ellipse cx="1110" cy="700" rx="34" ry="15" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="1225" y="642" text-anchor="middle" class="node-title">MySQL</text>
  <text x="1225" y="682" text-anchor="middle" class="node-copy">JPA batch insert</text>
  <text x="1225" y="716" text-anchor="middle" class="node-copy">방 최신 메시지·시간 갱신</text>

  <path d="M1370 455 V525 Q1370 555 1340 555 H1220 V590" class="arrow"/>
  <text x="1418" y="528" class="label">4. batch 저장</text>

  <path d="M1040 680 H550 Q500 680 500 630 V435" class="return"/>
  <text x="785" y="706" text-anchor="middle" class="label" fill="#2563eb">5. commit 성공 메시지만 반환</text>
  <path d="M400 385 H345 Q315 385 315 415 V495 Q315 525 285 525 H190 V395" class="return"/>
  <text x="385" y="507" class="label" fill="#2563eb">6. /sub/chat/room/{roomId}</text>

  <rect x="70" y="620" width="330" height="180" class="card"/>
  <text x="235" y="670" text-anchor="middle" class="node-title">Redis</text>
  <text x="235" y="712" text-anchor="middle" class="node-copy">Spring Session</text>
  <text x="235" y="746" text-anchor="middle" class="node-copy">온라인·채팅방 접속 상태 / 캐시</text>
  <text x="235" y="782" text-anchor="middle" class="node-copy" fill="#b45309">채팅 메시지 큐로 사용하지 않음</text>
  <path d="M400 590 H370 Q340 590 340 620" class="dashed"/>

  <g transform="translate(70 842)">
    <circle cx="10" cy="0" r="7" fill="#0f766e"/>
    <text x="28" y="6" class="node-copy">처리 경로</text>
    <circle cx="170" cy="0" r="7" fill="#2563eb"/>
    <text x="188" y="6" class="node-copy">저장 후 전달</text>
    <line x1="352" y1="0" x2="402" y2="0" class="dashed"/>
    <text x="418" y="6" class="node-copy">상태 조회</text>
  </g>
</svg>
