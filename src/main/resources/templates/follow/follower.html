<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Follower List</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
</head>
<body>
<div class="container" th:attr="data-target-email=${targetEmail},data-member-email=${email},data-mode='follower'">
  <h1>Follower List</h1>
  <form method="dialog">
    <button type="button" class="btn btn-success" onclick="history.back(-1)">Previous</button>
    <div class="card">
      <ul class="list-group-flush" id="followList"></ul>
    </div>
  </form>
</div>
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
<script src="/js/follow/follow.js"></script>
</body>
</html>
