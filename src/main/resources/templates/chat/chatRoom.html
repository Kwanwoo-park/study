<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
    <link rel="stylesheet" href="/css/common/common.css">
    <link rel="stylesheet" href="/css/chat/chat.css">
    <title>Chatting Room</title>
</head>
<body th:classappend="${isMobile} ? 'mobile-view' : ''">
    <script src="/js/common/theme.js"></script>
    <input type="hidden" id="room" th:value="${room}">
    <input type="hidden" id="email" th:value="${member}">
    <input type="hidden" id="flag" th:value="${flag}">
    <header class="chat-room-header">
        <div class="chat-room-participants">
                <span th:each="name, stat : ${participantNames}"
                      th:text="${name + (stat.last ? '' : ', ')}">참여자</span>
        </div>
    </header>
    <div class="container chat-room-container">
        <form method="dialog" enctype="multipart/form-data">
        <div class="msgArea">
            <ul class="list-group-flush"></ul>
        </div>
        </form>
        <button type="button" id="new-message-notice" class="chat-new-message-notice is-hidden">
            새 메시지
        </button>
    </div>
    <div class="chat-room-controls">
        <textarea class="form-control" id="chat" name="chat" rows="1" cols="" placeholder="보낼 메세지를 입력하세요." onkeydown="send(event)"></textarea>
        <button type="button" value="전송" class="btn btn-primary" onclick="sendMsg()">전송</button>
        <input type="file" id="upload" accept="image/*" onchange="fnLoad(this)" class="is-hidden" multiple/>
        <button type="button" class="btn btn-primary" id="btn">이미지 전송</button>
        <button type="button" value="방나가기" class="btn btn-danger" onclick="quit()" formmethod="post">방 나가기</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="/js/lib/jquery.min.js"></script>
    <script src="/js/lib/bootstrap.min.js"></script>
    <script src="/js/chat/chat.js"></script>
</body>
<footer>
    <div class="card">
        <div class="card-body text-center">
            <p class="card-text"><small class="text-muted">Copyright Park Kwanwoo. All Rights Reserved.</small></p>
        </div>
    </div>
</footer>
</html>
