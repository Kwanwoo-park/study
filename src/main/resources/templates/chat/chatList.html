<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
    <title>Chat List</title>
</head>
<body>
    <form action="/chat/createRoom" method="post">
        <input type="text" id="name" name="name" placeholder="채팅방 이름">
        <button type="submit" class="btn btn-primary" id="btn">방 만들기</button>
    </form>

    <table class="table table-striped table-horizontal table-bordered mt-3">
        <thead class="thead-strong">
            <tr>
                <th width="20%">방 번호</th>
                <th width="50%">방 이름</th>
                <th width="">참여 인원</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="room,index : ${roomList}">
                <td>
                    <span th:text="${index.index+1}"></span>
                </td>
                <td>
                    <a th:href="@{chatRoom(roomId=${room.roomId})}"
                       th:text="${room.name}"></a>
                </td>
                <td>
                    <span th:text="${room.count}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</body>
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
<script th:inline="javascript">
    function roomName(e) {
        const btn = document.querySelector("#btn");

        if (e.keyCode == 13)
            btn.click();
    }
</script>
</html>
