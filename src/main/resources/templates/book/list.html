<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book List</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Book List</h1>
        <form id="frm" method="dialog">
            <button type="button" class="btn btn-success" onclick="history.back(-1)">Previous</button>
            <button type="button" class="btn btn-success" onclick="fnClear()">Clear</button>
            <div >
                <input type="text" class="form-control" id="title" name="title"
                       placeholder="Search Book" onkeypress="fnFind(event)">
            </div>
            <table class="table table-striped table-horizontal table-bordered mt-3">
                <thead class="thead-strong">
                <tr>
                    <th width="">책번호</th>
                    <th width="">도서명</th>
                    <th width="">저자명</th>
                    <th width="">출판사</th>
                    <th width="">대분류</th>
                    <th width="">소분류</th>
                </tr>
                </thead>
                <tbody id="tbody">
                <tr th:each="list,index : ${book.list}" th:with="paging=${book.paging}">
                    <td>
                        <span th:text="${list.bnum}"></span>
                    </td>
                    <td>
                        <span th:text="${list.title}"></span>
                    </td>
                    <td>
                        <span th:text="${list.author}"></span>
                    </td>
                    <td>
                        <span th:text="${list.publisher}"></span>
                    </td>
                    <td>
                        <span th:text="${list.bsort}"></span>
                    </td>
                    <td>
                        <span th:text="${list.ssort}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="row">
                <div class="col">
                    <ul class="pagination">
                        <li class="page-item" th:each="index : ${#numbers.sequence(1, book.totalPage)}" th:with="paging=${book.paging}">
                            <a class="page-link" th:classappend="${paging.pageNumber == (index-1)} ? bg-primary : bg-secondary" th:href="@{./list(page=${index - 1}, page=${paging.pageSize})}">
                                <span class="text-white" th:text="${index}"></span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </form>
    </div>

    <script src="/js/lib/jquery.min.js"></script>
    <script type="application/json; charset=utf-8"
            src="/js/lib/bootstrap.min/js"></script>
    <script th:inline="javascript">
    /*<![CDATA[*/
    	function fnFind(e) {
    	    if (e.keyCode == 13) {
    	        const data = {
			        title : $("#title").val()
			    }

                $.ajax({
                    type: 'GET',
                    url: '/book/list/' +encodeURI(data.title) + '/action',
                    dataType: 'JSON',
                    contentType: 'application/json; charset=utf-8',
                    data: JSON.stringify(data),
                    success: function() {
                        window.location.reload();
                    },
                    error: function() {
                        alert("다시 시도하여주십시오.");
                    }
                })
    	    }
		}

		function fnClear() {
		    $.ajax({
		        type: 'GET',
		        url: '/book/clear'
		    }).always(function() {
		        window.location.reload();
		    })
		}
	/*]]>*/
	</script>
</body>
</html>
