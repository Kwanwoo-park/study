<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Report Process List</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
  <link rel="stylesheet" href="/css/common/common.css">
  <link rel="stylesheet" href="/css/admin/admin.css">
</head>
<body th:classappend="${isMobile} ? 'mobile-view' : ''">
<script src="/js/common/theme.js"></script>
<main class="container admin-report-page">
  <div class="admin-report-header">
    <div>
      <h1>신고 처리</h1>
      <p>접수되어 검토 중인 신고를 처리합니다.</p>
    </div>
    <div class="admin-report-header-actions">
      <button type="button" class="btn btn-outline-primary" onclick="location.href='/admin/report'">접수 대기</button>
      <button type="button" class="btn btn-outline-secondary" onclick="location.href='/admin/report/history'">처리 내역</button>
      <button type="button" class="btn btn-secondary" onclick="location.href='/admin/administrator'">관리자 홈</button>
    </div>
  </div>

  <div id="report-process-list" class="admin-report-list"></div>
</main>

<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
<script src="/js/admin/reportProcess.js"></script>
</body>
</html>
