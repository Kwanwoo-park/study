<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Administrator View</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--부트스트랩 css 추가-->
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
</head>
<body>
<div class="container">
  <h1>Member check</h1>
  <table class="table table-striped table-horizontal table-bordered mt-3">
    <thead class="thead-strong">
      <tr>
        <th width="10%">ID</th>
        <th width="20%">이름</th>
        <th width="">Email</th>
        <th width="10%">Role</th>
        <th width="20%">최근 접속일</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr th:each="list,index : ${member.list}">
        <td>
          <span th:text="${list.id}"></span>
        </td>
        <td>
          <span th:text="${list.name}"></span>
        </td>
        <td>
          <span th:text="${list.email}"></span>
        </td>
        <td>
          <span th:text="${list.role}"></span>
        </td>
        <td>
          <span th:text="${list.lastLoginTime}"></span>
        </td>
      </tr>
    </tbody>
  </table>

  <button type="button" class="btn btn-success" onclick="history.back(-1)">Previous</button>
</div>
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
</body>
</html>
