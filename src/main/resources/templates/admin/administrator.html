<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Administrator View</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--부트스트랩 css 추가-->
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
  <link rel="stylesheet" href="/css/common/common.css">
  <link rel="stylesheet" href="/css/admin/admin.css">
</head>
<body th:classappend="${isMobile} ? 'mobile-view' : ''">
  <script src="/js/common/theme.js"></script>
  <div class="container">
    <h1>Admin view</h1>
      <div class="float-left">
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/admin/memberCheck'">Member List</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/board/all'">Board List</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/board/main'">Board Main</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/admin/forbidden/word/list'">Forbidden word List</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/admin/forbidden/word/apply'">Forbidden word apply List</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/admin/report'">Report List</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/admin/report/process'">Report Process</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/chat/chatList'">Chatting</button>
        <button type="button" class="btn btn-primary" onclick="javascript:location.href='/portfolio'">Portfolio</button>
        <button type="button" class="btn btn-danger" onclick="fnLogout()">Logout</button>
      </div>
      <section class="admin-system-panel">
        <div class="admin-system-header">
          <h2>서버 상태</h2>
          <span id="system-status-updated" class="admin-system-updated">불러오는 중</span>
        </div>
        <div id="system-status" class="admin-system-grid"></div>
      </section>
      <section class="admin-report-dashboard">
        <div class="admin-report-dashboard-header">
          <div>
            <h2>최근 신고</h2>
            <span>접수되지 않은 최근 신고 10건</span>
          </div>
          <div class="admin-report-dashboard-actions">
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="location.href='/admin/report'">전체 보기</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="location.href='/admin/report/process'">처리 화면</button>
          </div>
        </div>
        <div id="recent-report-list" class="admin-report-card-grid"></div>
      </section>
      <div class="new-status" id="user-status"></div>
      <div class="new-status" id="new-user"></div>
      <div class="new-status" id="new-board"></div>
      <div class="new-status" id="active-chat-room"></div>
  </div>

<!--부트스트랩 js, jquery 추가-->
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
<script src="/js/admin/main.js"></script>
</body>
</html>
