<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>알림</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--부트스트랩 css 추가-->
    <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
    <link rel="stylesheet" href="/css/common/common.css">
    <link rel="stylesheet" href="/css/notification/list.css">
</head>
<body>
<th:block th:replace="~{fragments/common :: memberNavi(${member.email}, ${member.profile})}"></th:block>
<div class="container notification-page">
    <th:block th:replace="~{fragments/common :: notificationBanner}"></th:block>
    <header class="page-header">
        <div>
            <h1 class="page-title">알림</h1>
            <p class="page-description">새 소식과 활동 내역을 한 곳에서 확인하세요.</p>
        </div>
        <button class="btn btn-primary" onclick="fnAllRead()">모두 읽음</button>
    </header>
    <div class="noti-group">
        <button type="button" id="admin" onclick="fnClick('ADMIN')">시스템</button>
        <button type="button" id="follow" onclick="fnClick('FOLLOW')">팔로우</button>
        <button type="button" id="favorite" onclick="fnClick('FAVORITE')">좋아요</button>
        <button type="button" id="chat" onclick="fnClick('CHAT')">채팅</button>
        <button type="button" id="comment" onclick="fnClick('COMMENT')">댓글</button>
        <button type="button" id="reply" onclick="fnClick('REPLY')">답글</button>
    </div>
    <div class="noti-div">
    </div>
</div>
<!--부트스트랩 js, jquery 추가-->
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
<script src="/js/notification/list.js"></script>
<script src="/js/common/common.js"></script>
</body>
<th:block th:replace="~{fragments/common :: pageFooter}"></th:block>
</html>
