<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Member List</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
</head>
<body>
<div class="container">
  <h1>Member List</h1>
  <form action="/member_find/action" method="post">
    <button type="button" class="btn btn-success" onclick="javascript:location.href='/board/list'">Previous</button>
    <div >
      <input type="text" class="form-control" id="name" name="name" placeholder="Search member">
    </div>
    <div class="card">
      <ul class="list-group-flush">
        <li class="list-group-item" th:each="list,index : ${member?.list}">
          <span>
            <span th:text="${index?.index+1}"></span>
            <a th:href="@{./member_detail(email=${list?.email})}"><span th:text="${list?.name}"></span></a>
            <span th:text="${list?.email}"></span>
          </span>
        </li>
      </ul>
    </div>
  </form>
</div>
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min/js"></script>
</body>
</html>
