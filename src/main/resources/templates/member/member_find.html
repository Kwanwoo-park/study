<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Member List</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
  <link rel="stylesheet" href="/css/common/common.css">
  <link rel="stylesheet" href="/css/member/search.css">
</head>
<body th:classappend="${isMobile} ? 'mobile-view' : ''">
<th:block th:replace="~{fragments/common :: memberNavi(${email}, ${profile})}"></th:block>
  <main class="container member-search-page">
    <th:block th:replace="~{fragments/common :: notificationBanner}"></th:block>
    <section class="member-search-header">
      <h1>Member Search</h1>
      <p>닉네임에 검색어가 포함된 회원을 찾습니다.</p>
    </section>
    <div class="member-search-box">
      <input type="search" class="form-control" id="name" name="name" placeholder="닉네임 검색" autocomplete="off">
    </div>
    <div class="member-search-results" id="searchResult" aria-live="polite"></div>
  </main>

  <script src="/js/lib/jquery.min.js"></script>
  <script src="/js/lib/bootstrap.min.js"></script>
  <script src="/js/member/search.js"></script>
  <script src="/js/common/common.js"></script>
</body>
<th:block th:replace="~{fragments/common :: pageFooter}"></th:block>
</html>
