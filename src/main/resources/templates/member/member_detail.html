<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Member Detail</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--부트스트랩 css 추가-->
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
</head>
<body>
<div class="container">
  <h1>Member Detail</h1>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Email: </label>
      <label class="form-label" th:text="${member.email}"></label>
    </div>
    <div class="mb-3">
      <label class="form-label">Name: </label>
      <label class="form-label" th:text="${member.name}"></label>
    </div>
    <div class="mb-3">
      <label class="form-label">Last Login time: </label>
      <label class="form-label" th:text="${member.lastLoginTime}"></label>
    </div>
    <div class="mb-3">
      <label class="form-label">Follower: </label>
      <label class="form-label" th:text="${follower}"></label>
      <label class="form-label">&nbsp;Following: </label>
      <label class="form-label" th:text="${following}"></label>
    </div>
    <button type="button" class="btn btn-success" onclick="javascript:location.href='/member_find'">Previous</button>
    <button type="submit" class="btn btn-success" formaction="/member_detail/action">Follow</button>
  </form>
</div>
<!--부트스트랩 js, jquery 추가-->
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
</body>
</html>
