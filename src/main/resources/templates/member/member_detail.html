<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Member Detail</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!--부트스트랩 css 추가-->
  <link rel="stylesheet" href="/css/lib/bootstrap.min.css">
  <link rel="stylesheet" href="/css/follow/follower-modal.css">
  <link rel="stylesheet" href="/css/follow/following-modal.css">
  <link rel="stylesheet" href="/css/common/common.css">
  <link rel="stylesheet" href="/css/member/member-detail.css">
  <link rel="stylesheet" href="/css/comment/modal.css">
  <link rel="stylesheet" href="/css/favorite/modal.css">
</head>
<body>
<th:block th:replace="~{fragments/common :: memberNavi(${email}, ${profile})}"></th:block>
<div class="container">
  <th:block th:replace="~{fragments/common :: notificationBanner}"></th:block>
    <div class="profileDiv">
      <img th:src="${member.profile}" width="200vw" height="200vw" style="border-radius: 90px" id="profile">
      &nbsp;&nbsp;&nbsp;&nbsp;
      <h4>
        <label class="form-label" th:text="${member.name}" style="margin-right: 10px;"></label>
        <button type="button" th:if="${status}" id="follow" class="btn btn-success">Unfollow</button>
        <button type="button" th:unless="${status}" id="follow" class="btn btn-success">Follow</button>
        <button type="button" id="chatting" class="btn btn-success">Chatting</button>
        <br>
        <br>
        <label class="form-label">Posts: </label>
        <label class="form-label" th:text="${member.board.size}"></label>
        <label class="form-label" th:onclick="openFollowerModal([[${member.email}]])" > Follower: </label>
        <label class="form-label" id="follower_label" th:text="${member.following.size}" th:onclick="openFollowerModal([[${member.email}]])" ></label>
        <label class="form-label" th:onclick="openFollowingModal([[${member.email}]])">Following: </label>
        <label class="form-label" id="following_label" th:text="${member.follower.size}" th:onclick="openFollowingModal([[${member.email}]])"></label>
      </h4>
    </div>
    <div class="imgGrid">
      <div class="imgDiv" th:each="list, index : ${resultMap}">
          <img th:if="${list.img.size == 0}"
               class="main-image"
               th:src="@{/img/} + 'IMG_0111.jpeg'"
               th:id="'main_img'+${list.id}"
               th:onclick="openBoardModal([[${list.id}]])">

          <img th:unless="${list.img.size == 0}"
               class="main-image"
               th:src="${list.img[0].imgSrc}"
               th:id="'main_img'+${list.id}"
               th:onclick="openBoardModal([[${list.id}]])">
      </div>
    </div>
</div>
<th:block th:replace="~{fragments/board-modal :: boardModal}"></th:block>
<th:block th:replace="~{fragments/comment-modal :: commentModal}"></th:block>
<th:block th:replace="~{fragments/favorite-modal :: favoriteModal}"></th:block>
<th:block th:replace="~{fragments/follower-modal :: followerModal}"></th:block>
<th:block th:replace="~{fragments/following-modal :: followingModal}"></th:block>
<!--부트스트랩 js, jquery 추가-->
<script src="/js/lib/jquery.min.js"></script>
<script src="/js/lib/bootstrap.min.js"></script>
<script src="/js/follow/followerModal.js"></script>
<script src="/js/follow/followingModal.js"></script>
<script src="/js/comment/modal.js"></script>
<script src="/js/favorite/modal.js"></script>
<script src="/js/member/boardModal.js"></script>
<script src="/js/member/memberDetail.js"></script>
<script src="/js/common/common.js"></script>
</body>
<th:block th:replace="~{fragments/common :: pageFooter}"></th:block>
</html>
